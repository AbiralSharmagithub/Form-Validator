<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator</title>
    <link rel="stylesheet" href="/Css/index.css">
</head>
<body>
    <div class="container">
        <h1 id="header">Register</h1>
        <form class="validator-form">
            <label for="username">Username</label>
            <input type="text" name="username" placeholder="Enter username" id="username required>
            <label for="email">Email</label>
            <input type="text" name="email" placeholder="Enter email" id="email" required>
            <label for="password">Password</label>
            <input type="text" name="password" placeholder="Enter password" id="password" required>
            <label for="confirm_password">Confirm Password</label>
            <input type="text" name="confirm_password" placeholder="Confirm password" id="confirm_password" required>
            <button type="submit" id="submit-btn">Register</button>
        </form>
    </div>
    <script src="/Javascript/index.js"></script>
</body>
</html>
